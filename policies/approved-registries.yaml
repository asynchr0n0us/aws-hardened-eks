apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sapprovedregistries
  annotations:
    description: "Requires container images to come from approved registries"
spec:
  crd:
    spec:
      names:
        kind: K8sApprovedRegistries
      validation:
        openAPIV3Schema:
          type: object
          properties:
            registries:
              type: array
              items:
                type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sapprovedregistries
        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          not approved(container.image)
          msg := sprintf("Container image '%v' is not from an approved registry", [container.image])
        }
        approved(image) {
          registry := input.parameters.registries[_]
          startswith(image, registry)
        }
---

apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sApprovedRegistries
metadata:
  name: approved-registries
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    excludedNamespaces:
      - kube-system
  parameters:
    registries:
      - "123456789012.dkr.ecr.eu-central-1.amazonaws.com"
      - "public.ecr.aws"
      - "registry.k8s.io"
      - "quay.io/falcosecurity"
      - "ghcr.io/aquasecurity"
